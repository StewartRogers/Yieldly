  </defs>
  <!-- Circle ring -->
  <circle cx="50" cy="42" r="28" fill="none" stroke="url(#cg)" stroke-width="8"/>
  <!-- Bar chart (3 bars) -->
  <rect x="33" y="52" width="8" height="12" rx="2" fill="url(#bg)"/>
  <rect x="45" y="46" width="8" height="18" rx="2" fill="url(#bg)"/>
  <rect x="57" y="40" width="8" height="24" rx="2" fill="url(#bg)"/>
  <!-- Up-arrow chevron -->
  <polyline points="38,55 50,38 62,48" fill="none" stroke="#A2D45E" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
