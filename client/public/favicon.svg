<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#82C341"/>
      <stop offset="100%" stop-color="#1B7F42"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3B9FC2"/>
      <stop offset="100%" stop-color="#5EBCE5"/>
